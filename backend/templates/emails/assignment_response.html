<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background: #747d8c; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Réponse à la mission</h1>
        </div>
        <div class="content">
            <p>Bonjour Admin,</p>
            <p>L'animateur <strong>{{ assignment.animateur }}</strong> a répondu à la mission pour la réservation <strong>#{{ assignment.booking.booking_number }}</strong>.</p>
            <p>Le statut est maintenant : <strong>{{ assignment.status }}</strong>.</p>
        </div>
        <div class="footer">
            &copy; 2026 Funkidz. Tous droits réservés.
        </div>
    </div>
</body>
</html>
