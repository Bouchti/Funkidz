services:
  db:
    image: postgres:16-alpine
    container_name: funkidz_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-funkidz_db}
      POSTGRES_USER: ${DB_USER:-funkidz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-funkidz_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-funkidz_user} -d ${DB_NAME:-funkidz_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: funkidz_backend
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: funkidz_frontend
    volumes:
      - frontend_build:/app/dist

  nginx:
    image: nginx:stable-alpine
    container_name: funkidz_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  frontend_build:
  media_volume:
  static_volume:
